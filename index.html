<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniLib — Your Anime & Manga Library</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">⛩</span>
      <span class="logo-text">AniLib</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="search">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Discover
      </a>
      <a href="#" class="nav-item" data-section="favorites">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        My Library
      </a>
      <a href="#" class="nav-item" data-section="trending">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Trending
      </a>
    </nav>
    <div class="sidebar-filters" id="genreFilters">
      <p class="filter-label">Genres</p>
      <button class="genre-tag active" data-genre="">All</button>
      <button class="genre-tag" data-genre="shonen">Shōnen</button>
      <button class="genre-tag" data-genre="shojo">Shōjo</button>
      <button class="genre-tag" data-genre="seinen">Seinen</button>
      <button class="genre-tag" data-genre="isekai">Isekai</button>
      <button class="genre-tag" data-genre="romance">Romance</button>
      <button class="genre-tag" data-genre="action">Action</button>
      <button class="genre-tag" data-genre="fantasy">Fantasy</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HERO BANNER -->
    <section class="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">Your manga universe awaits</p>
        <h1 class="hero-title">Discover.<br/>Read.<br/>Obsess.</h1>
        <p class="hero-sub">Search thousands of manga, light novels, and anime artbooks.</p>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search by title, author, ISBN..." />
          <button id="searchBtn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
        <div class="quick-searches">
          <span class="qs-label">Try:</span>
          <button class="qs-btn" data-q="naruto">Naruto</button>
          <button class="qs-btn" data-q="attack on titan">Attack on Titan</button>
          <button class="qs-btn" data-q="one piece">One Piece</button>
          <button class="qs-btn" data-q="demon slayer">Demon Slayer</button>
        </div>
      </div>
      <div class="hero-art">
        <div class="manga-panel panel-1"></div>
        <div class="manga-panel panel-2"></div>
        <div class="manga-panel panel-3"></div>
        <div class="floating-badge badge-1">万 漫画</div>
        <div class="floating-badge badge-2">アニメ</div>
      </div>
    </section>

    <!-- STATUS BAR -->
    <div class="status-bar" id="statusBar" style="display:none;">
      <div class="status-inner">
        <div class="spinner" id="spinner" style="display:none;"></div>
        <span id="statusText"></span>
      </div>
    </div>

    <!-- ERROR -->
    <div class="error-box" id="errorBox" style="display:none;">
      <span class="error-icon">⚠</span>
      <span id="errorText"></span>
    </div>

    <!-- RESULTS SECTION -->
    <section class="results-section" id="resultsSection" style="display:none;">
      <div class="results-header">
        <h2 id="resultsTitle">Results</h2>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" title="Grid view">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listViewBtn" title="List view">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2"/><rect x="3" y="11" width="18" height="2"/><rect x="3" y="17" width="18" height="2"/></svg>
          </button>
        </div>
      </div>
      <div class="book-grid" id="bookGrid"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- MY LIBRARY SECTION -->
    <section class="results-section" id="librarySection" style="display:none;">
      <div class="results-header">
        <h2>My Library</h2>
        <span class="lib-count" id="libCount">0 saved</span>
      </div>
      <div class="empty-library" id="emptyLibrary">
        <div class="empty-art">⛩️</div>
        <p>Your library is empty.<br/>Search for manga and save to your list!</p>
      </div>
      <div class="book-grid" id="libraryGrid"></div>
    </section>

    <!-- TRENDING SECTION -->
    <section class="results-section" id="trendingSection" style="display:none;">
      <div class="results-header">
        <h2>Trending Manga & Anime</h2>
      </div>
      <div class="trending-list" id="trendingList"></div>
    </section>

  </main>

  <!-- BOOK DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="bookModal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-inner" id="modalInner"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
